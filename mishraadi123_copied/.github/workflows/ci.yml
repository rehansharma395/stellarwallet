name: Aether Sweepstakes CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  contracts:
    name: Contracts CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust (stable + wasm target)
        # Soroban SDK 26 requires the wasm32v1-none target (Rust 1.84+),
        # not wasm32-unknown-unknown.
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache Cargo Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run Contract Tests
        run: cargo test --verbose

      - name: Build Contract WASM
        run: cargo build --release --target wasm32v1-none

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps
        working-directory: frontend

      - name: Run Lint
        run: npm run lint
        working-directory: frontend

      - name: Run Unit Tests
        run: npm test
        working-directory: frontend

      - name: Build Frontend (Static Export)
        run: npm run build
        working-directory: frontend
