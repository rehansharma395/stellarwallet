name: Conduit Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Job 1: Rust Soroban Core Validation
  rust-soroban-core:
    name: Rust Soroban Core Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Rust Cache Setup
        uses: Swatinem/rust-cache@v2

      - name: Check Formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy Linter
        run: cargo clippy --all-targets -- -D warnings

      - name: Run Smart Contract Tests
        run: cargo test --workspace --verbose

  # Job 2: Next.js Full-Stack & UI Validation
  nextjs-fullstack:
    name: Next.js Full-Stack & UI Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Client-side Utility & Integration Tests
        working-directory: frontend
        run: npx vitest run

      - name: Run Next.js Linting Check
        working-directory: frontend
        run: npm run lint

      - name: Verify Static Deployment Compilation
        working-directory: frontend
        run: npm run build
